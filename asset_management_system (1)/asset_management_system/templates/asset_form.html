{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Edit Asset' if asset else 'Add New Asset' }}</h1>
<form method="post" class="card shadow-sm p-4 mt-3">
    <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Asset Tag</label><input class="form-control" name="asset_tag" value="{{ asset.asset_tag if asset else '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Device Type</label><input class="form-control" name="device_type" value="{{ asset.device_type if asset else '' }}" placeholder="Laptop, Monitor, Phone" required></div>
        <div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in ['Available','Assigned','Maintenance','Retired'] %}<option value="{{ status }}" {% if asset and asset.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Brand</label><input class="form-control" name="brand" value="{{ asset.brand if asset else '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Model</label><input class="form-control" name="model" value="{{ asset.model if asset else '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Serial Number</label><input class="form-control" name="serial_number" value="{{ asset.serial_number if asset else '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Assigned To</label><input class="form-control" name="assigned_to" value="{{ asset.assigned_to if asset else '' }}"></div>
        <div class="col-md-4"><label class="form-label">Department</label><input class="form-control" name="department" value="{{ asset.department if asset else '' }}"></div>
        <div class="col-md-4"><label class="form-label">Location</label><input class="form-control" name="location" value="{{ asset.location if asset else '' }}"></div>
        <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="3">{{ asset.notes if asset else '' }}</textarea></div>
    </div>
    <div class="mt-4 d-flex gap-2">
        <button class="btn btn-primary">Save Asset</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
